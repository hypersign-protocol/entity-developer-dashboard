name: PR Hygiene & Governance

on:
  pull_request:
    types: [ opened, synchronize, reopened, labeled, unlabeled ]
  pull_request_review:
    types: [ submitted ]

permissions:
  contents: read
  pull-requests: read

jobs:
  hygiene:
    name: PR Hygiene Checks
    runs-on: ubuntu-latest

    outputs:
      skip: ${{ steps.skip.outputs.skip }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js runtime
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Detect changed files
      id: changes
      shell: bash
      run: |
        set -euo pipefail
        base_ref="${{ github.event.pull_request.base.ref }}"
        git fetch origin "$base_ref"

        git diff --name-only "origin/$base_ref"...HEAD > changed_files.txt

        echo "Changed files:"
        cat changed_files.txt

        {
          echo "list<<EOF"
          cat changed_files.txt
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Evaluate skip label
      id: skip
      shell: bash
      run: |
        set -euo pipefail
        labels='${{ toJson(github.event.pull_request.labels) }}'

        if echo "$labels" | grep -qi 'hygiene-skip'; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "Hygiene checks skipped due to label."
        else
          echo "skip=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate changelog update
      if: ${{ steps.skip.outputs.skip != 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        if ! grep -Eiq '(^|/)(CHANGELOG|changelog)(\.md)?$' changed_files.txt; then
          echo "::error::Missing changelog update (expected CHANGELOG.md or equivalent)."
          exit 1
        fi

    - name: Validate package version bump
      if: ${{ steps.skip.outputs.skip != 'true' }}
      shell: bash
      run: |
        set -euo pipefail

        if ! grep -q 'package.json' changed_files.txt; then
          echo "No package.json changes detected — skipping version validation."
          exit 0
        fi

        base_ref="${{ github.event.pull_request.base.ref }}"

        grep -Eo '(^|/)[^ ]*package.json' changed_files.txt | while read -r file; do
          file=$(echo "$file" | tr -d '\r')

          echo "Validating version bump for: $file"

          git show "origin/$base_ref:$file" > /tmp/base_pkg.json || echo '{}' > /tmp/base_pkg.json
          git show "HEAD:$file" > /tmp/head_pkg.json

          node <<'EOF'
          const fs = require('fs');

          const base = JSON.parse(fs.readFileSync('/tmp/base_pkg.json', 'utf-8'));
          const head = JSON.parse(fs.readFileSync('/tmp/head_pkg.json', 'utf-8'));

          if (!head.version) {
            console.error('::error::package.json missing version field');
            process.exit(1);
          }

          if (!base.version) {
            console.log('No base version found — treating as new package.');
            process.exit(0);
          }

          if (base.version === head.version) {
            console.error(`::error::Version not bumped (${base.version})`);
            process.exit(1);
          }

          console.log(`Version updated: ${base.version} → ${head.version}`);
          EOF
        done

  approval:
    name: Approval Gate
    runs-on: ubuntu-latest
    needs: hygiene
    if: ${{ github.event_name == 'pull_request_review' && needs.hygiene.outputs.skip != 'true' }}

    steps:
    - name: Verify at least one approval
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const pr = context.payload.pull_request;

          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number
          });

          const approved = reviews.some(r => r.state === 'APPROVED');

          if (!approved) {
            core.setFailed('At least one approving review is required.');
          } else {
            core.info('Approval requirement satisfied.');
          }
